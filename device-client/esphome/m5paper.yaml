# CastKit — M5Paper (ESP32 touch e-ink) firmware
# ============================================================================
# A self-contained ESPHome node that joins a CastKit fleet as an IMAGE-mode
# (Inkcast) device: the CastKit server renders + dithers this panel's view to a
# 1-bit PNG and Home Assistant hands the panel a single-use token URL, which the
# panel PULLS over HTTP and blits. See:
#   docs/decisions/2026-07-03-esphome-http-image-delivery.md   (pull-over-HTTP)
#   docs/decisions/2026-07-08-m5paper-image-plus-touch-plus-fast-update.md
#   device-client/esphome/README.md                            (flash + HA wiring)
#
# Home Assistant talks to this panel over the native ESPHome API (the sanctioned
# exception to CastKit's MQTT-only house contract): HA calls the `set_image`
# action with a fresh render URL, and reads the touch/buttons back as entities.
#
# Hardware config follows the ilia-ae/m5paper_esphome known-good example for
# ESPHome >= 2024.12.4. gt911 (touch) and spi are MAINLINE ESPHome components;
# only it8951e + m5paper come from the external repo (which must expose them
# under components/ — the old sebirdman repo used custom_components/, which
# ESPHome can't find, and was the original "add" error).
# ----------------------------------------------------------------------------

substitutions:
  node_name: m5paper
  friendly_name: "M5Paper"

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  min_version: 2024.12.4
  # NOTE: intentionally NO on_boot display action. E-ink holds the last frame at
  # zero power, so after a reboot / OTA / battery-recharge we LEAVE the panel as
  # it is — the last render stays on glass (the crash-recovery story). A
  # boot-time `it8951e.clear` + `updateslow` (previously here) wiped the panel to
  # white on every reboot. The panel repaints ONLY when HA/CastKit pushes a new
  # image via `set_image` (online_image.on_download_finished, below).

esp32:
  # Classic ESP32 (the M5Paper is an ESP32-D0WDQ6). Use the generic esp32dev so
  # ESPHome's Device Builder can't mis-tag the board — if a device is first
  # CREATED in the builder wizard as an ESP32-C6, the builder stores that chip in
  # its device record (separate from this YAML) and the installer checks THAT,
  # causing a "device expects esp32c6" chip mismatch even though the YAML/build
  # are ESP32. Create the device from this file (or Change board → ESP32), don't
  # let the wizard pick the chip. PSRAM comes from the psram: block below.
  board: esp32dev
  # ESP-IDF (not arduino): the panel needs a native MQTT client with TLS to
  # subscribe to CastKit's render-URL topic, and ESPHome only supports MQTT-over-
  # TLS on the esp-idf framework. The vendored it8951e/m5paper components are
  # framework-agnostic (ESPHome HAL + esp-idf `driver/gpio.h`), so they build
  # here unchanged — see components/PATCHES.md.
  framework:
    type: esp-idf

# The IT8951E e-ink buffer lives in PSRAM. Required on this board.
psram:

# it8951e (e-ink controller) + m5paper (power latch) are not in mainline ESPHome.
# They're VENDORED locally in ./components (from ilia-ae/m5paper_esphome) because
# that upstream is ~1.5 years stale and does NOT compile on ESPHome 2026.6+ as-is
# — see components/PATCHES.md for the one-line fix applied. Flash the whole
# directory (m5paper.yaml + components/ + secrets.yaml) as a unit.
external_components:
  - source:
      type: local
      path: components
    components: [it8951e, m5paper]

# --- Connectivity -----------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap: {} # captive-portal fallback if wifi is unreachable

captive_portal:

logger:
  level: INFO

# Native ESPHome API — HA reads the touch/button entities back out, and keeps a
# manual `set_image` action as a fallback. The live minute-by-minute refresh no
# longer goes through here: CastKit drives it over MQTT (the `mqtt:` block
# above). Both API and MQTT run side by side.
api:
  encryption:
    key: !secret api_encryption_key
  actions:
    # Manual/fallback push (the MQTT `image_url` subscription is the live path):
    #   esphome.m5paper_set_image(image_url: "https://<castkit-host>/render/<token>.png")
    # The panel re-points online_image at that URL and fetches; the image's
    # on_download_finished trigger then repaints the panel. CastKit is served
    # over https with an internal cert, so http_request needs verify_ssl: false
    # below.
    - action: set_image
      variables:
        image_url: string
      then:
        - online_image.set_url:
            id: now_playing_image
            url: !lambda return image_url;
            update: true

ota:
  - platform: esphome

# --- CastKit render delivery (MQTT signal + HTTP pull) -----------------------
# The panel can't blit MQTT image BYTES, so CastKit publishes a single-use
# render URL to `castkit/<node>/image_url` once the server re-renders (every
# minute for a clock, plus on any data change). The panel subscribes, re-points
# online_image at that URL, and pulls the PNG over HTTP — MQTT for the *signal*,
# HTTP for the *bytes*. The broker is TLS-only; ESPHome MQTT-TLS needs esp-idf
# (see the framework note above). CastKit owns this panel's HA discovery, so the
# device publishes none of its own (`discovery: false`).
mqtt:
  broker: !secret mqtt_broker
  port: 8883
  username: !secret mqtt_username
  password: !secret mqtt_password
  discovery: false
  topic_prefix: m5paper-esphome
