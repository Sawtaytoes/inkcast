# CastKit — M5Paper (ESP32 touch e-ink) firmware
# ============================================================================
# A self-contained ESPHome node that joins a CastKit fleet as an IMAGE-mode
# (Inkcast) device: the CastKit server renders + dithers this panel's view to a
# 1-bit PNG and Home Assistant hands the panel a single-use token URL, which the
# panel PULLS over HTTP and blits. See:
#   docs/decisions/2026-07-03-esphome-http-image-delivery.md   (pull-over-HTTP)
#   docs/decisions/2026-07-08-m5paper-image-plus-touch-plus-fast-update.md
#   device-client/esphome/README.md                            (flash + HA wiring)
#
# Home Assistant talks to this panel over the native ESPHome API (the sanctioned
# exception to CastKit's MQTT-only house contract): HA calls the `set_image`
# action with a fresh render URL, and reads the touch/buttons back as entities.
#
# Hardware config follows the ilia-ae/m5paper_esphome known-good example for
# ESPHome >= 2024.12.4. gt911 (touch) and spi are MAINLINE ESPHome components;
# only it8951e + m5paper come from the external repo (which must expose them
# under components/ — the old sebirdman repo used custom_components/, which
# ESPHome can't find, and was the original "add" error).
# ----------------------------------------------------------------------------

substitutions:
  node_name: m5paper
  friendly_name: "M5Paper"

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  min_version: 2024.12.4
  on_boot:
    priority: 200
    then:
      # Stabilise the panel after power/bus come up, then a clean full refresh.
      - delay: 3s
      - it8951e.clear
      - delay: 100ms
      - it8951e.updateslow

esp32:
  # Classic ESP32 (the M5Paper is an ESP32-D0WDQ6). Use the generic esp32dev so
  # ESPHome's Device Builder can't mis-tag the board — if a device is first
  # CREATED in the builder wizard as an ESP32-C6, the builder stores that chip in
  # its device record (separate from this YAML) and the installer checks THAT,
  # causing a "device expects esp32c6" chip mismatch even though the YAML/build
  # are ESP32. Create the device from this file (or Change board → ESP32), don't
  # let the wizard pick the chip. PSRAM comes from the psram: block below.
  board: esp32dev
  framework:
    type: arduino

# The IT8951E e-ink buffer lives in PSRAM. Required on this board.
psram:

# it8951e (e-ink controller) + m5paper (power latch) are not in mainline ESPHome.
# They're VENDORED locally in ./components (from ilia-ae/m5paper_esphome) because
# that upstream is ~1.5 years stale and does NOT compile on ESPHome 2026.6+ as-is
# — see components/PATCHES.md for the one-line fix applied. Flash the whole
# directory (m5paper.yaml + components/ + secrets.yaml) as a unit.
external_components:
  - source:
      type: local
      path: components
    components: [it8951e, m5paper]

# --- Connectivity -----------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap: {} # captive-portal fallback if wifi is unreachable

captive_portal:

logger:
  level: INFO

# Native ESPHome API — how Home Assistant talks to this panel. HA pushes the
# render URL in via the `set_image` action; HA reads the touch/button entities
# back out. No MQTT on the device.
api:
  encryption:
    key: !secret api_encryption_key
  actions:
    # HA calls this after the CastKit server mints a token URL for a fresh
    # render, e.g.:
    #   esphome.m5paper_set_image(image_url: "https://castkit.octen.dev/render/<token>.png")
    # The panel re-points online_image at that URL and fetches; the image's
    # on_download_finished trigger then repaints the panel. CastKit lives at the
    # LAN host https://castkit.octen.dev (internal cert) — so http_request needs
    # verify_ssl: false below.
    - action: set_image
      variables:
        image_url: string
      then:
        - online_image.set_url:
            id: now_playing_image
            url: !lambda return image_url;
            update: true

ota:
  - platform: esphome

# --- Buses ------------------------------------------------------------------
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO12
  miso_pin: GPIO13

i2c:
  sda: GPIO21
  scl: GPIO22
  frequency: 100khz

# M5Paper power latch (external component). Holds the main-power rail on so the
# panel stays awake on battery. Owns GPIO2/GPIO5 — don't redeclare them.
m5paper:
  battery_power_pin: GPIO5
  main_power_pin: GPIO2

# HTTP client used by online_image to pull the render. CastKit is served over
# https at the LAN host castkit.octen.dev with an internal cert, so skip cert
# verification on the ESP32.
http_request:
  timeout: 10s
  verify_ssl: false

# The pushed render. CastKit dithers to 1-bit black/white, so BINARY (~65 KB for
# 540x960) is exact for the mono panel. The URL here is a placeholder; HA
# overwrites it live via the `set_image` action. When the download finishes we
# do a full (slow) refresh for a clean, ghost-free frame.
online_image:
  - id: now_playing_image
    url: "http://192.0.2.1/placeholder.png"
    format: png
    type: BINARY
    resize: 540x960
    on_download_finished:
      - lambda: id(m5paper_display).update_slow();
    on_error:
      - logger.log: "CastKit render fetch failed"

# --- Display ----------------------------------------------------------------
display:
  - platform: it8951e
    id: m5paper_display
    cs_pin: GPIO15
    reset_pin: GPIO23
    reset_duration: 100ms
    busy_pin: GPIO27
    model: M5EPD
    # rotation 90 presents the native 960x540 landscape panel as PORTRAIT
    # 540x960 to match the `m5paper` entry in inkcast.config.example.json.
    # If the render lands sideways/upside-down, this is the one knob (0/90/180/270).
    rotation: 90
    reversed: false
    # Never auto-refresh: e-ink holds the last frame at zero power. We repaint
    # only when HA pushes a new render (on_download_finished above).
    update_interval: never
    lambda: |-
      // Blit the pushed render 1:1. On the mono panel COLOR_ON = black ink,
      // COLOR_OFF = white paper.
      it.image(0, 0, id(now_playing_image), COLOR_ON, COLOR_OFF);

      // --- Fast-update music progress bar (EXPERIMENTAL) --------------------
      // it8951e supports a FAST refresh via id(m5paper_display).update() (vs the
      // full-flash .update_slow()), so a thin now-playing bar can repaint
      // locally without re-pushing the card. Uncomment + drive from an HA
      // number/sensor once you've confirmed the fast path looks right.
      //
      // if (id(media_duration).state > 0) {
      //   int bar_y = it.get_height() - 8;
      //   float fraction = id(media_position).state / id(media_duration).state;
      //   int filled = (int)(it.get_width() * fraction);
      //   it.filled_rectangle(0, bar_y, filled, 8, COLOR_ON);
      // }

# --- Touch (DISABLED for first flash) ---------------------------------------
# GT911 capacitive touch is MAINLINE, but ESPHome regressed the GT911 reset to
# drive the interrupt pin as an OUTPUT, which fails on the M5Paper's input-only
# GPIO36 (esphome/esphome#14953, seen on 2026.3.0+). Left commented so the first
# flash compiles cleanly; re-enable once the base panel is confirmed working
# (and the GPIO36 handling is verified on your ESPHome version).
#
# touchscreen:
#   - platform: gt911
#     id: gt911_touchscreen
#     display: m5paper_display
#     interrupt_pin: GPIO36
#     on_touch:
#       - lambda: |-
#           char buffer[32];
#           sprintf(buffer, "(%d, %d)", touch.x, touch.y);
#           id(touch_coordinates).publish_state(buffer);
#
# text_sensor:
#   - platform: template
#     name: "Touch Coordinates"
#     id: touch_coordinates

# --- Buttons (read by Home Assistant) ---------------------------------------
binary_sensor:
  # The three hardware buttons down the edge of the M5Paper (active-low).
  - platform: gpio
    name: "Button: Left"
    pin:
      number: GPIO39
      inverted: true
  - platform: gpio
    name: "Button: Center"
    pin:
      number: GPIO38
      inverted: true
  - platform: gpio
    name: "Button: Right"
    pin:
      number: GPIO37
      inverted: true
